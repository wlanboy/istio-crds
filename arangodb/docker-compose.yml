services:
  arangodb:
    image: arangodb:latest
    container_name: arangodb
    restart: unless-stopped
    ports:
      - "8529:8529"  # HTTP (Browser/API)
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:-changeme123}
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8529/_admin/server/availability"]
      interval: 5s
      timeout: 5s
      retries: 10

  arangodb-init:
    image: arangodb:latest
    container_name: arangodb-init
    restart: "no"
    depends_on:
      arangodb:
        condition: service_healthy
    volumes:
      - ./init:/init:ro
    entrypoint: ["arangosh"]
    command:
      - "--server.endpoint=tcp://arangodb:8529"
      - "--server.password=${ARANGO_ROOT_PASSWORD:-changeme123}"
      - "--javascript.execute=/init/create-istio-db.js"
      - "${ISTIO_DB:-istio}"
      - "${ISTIO_USER:-istio}"
      - "${ISTIO_PASSWORD:-changeme123}"

  web:
    image: nginx:alpine
    container_name: web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../arangoweb:/usr/share/nginx/html:ro
    depends_on:
      - arangodb

volumes:
  arangodb_data:
  arangodb_apps:
