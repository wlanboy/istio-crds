<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArangoDB Graph Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-panel" class="panel">
  <h1>ArangoDB Graph Viewer</h1>
  <form id="login-form">
    <label>Endpoint
      <input type="text" id="endpoint" value="http://localhost:8529" required>
    </label>
    <label>Datenbank
      <input type="text" id="database" value="istio" required>
    </label>
    <label>Benutzer
      <input type="text" id="user" value="istio" required>
    </label>
    <label>Passwort
      <input type="password" id="password" value="" required>
    </label>
    <label>Limit (max. Knoten)
      <input type="number" id="limit" value="300" min="1" max="5000">
    </label>
    <button type="submit" id="connect-btn">Verbinden</button>
    <p id="login-error" class="error"></p>
  </form>
</div>

<div id="graph-panel" class="hidden">
  <div id="tabs">
    <button class="tab-btn active" id="tab-full" data-view="full">Gesamtgraph</button>
    <button class="tab-btn" id="tab-connections" data-view="connections">Verbindungsgraph</button>
  </div>
  <div id="toolbar">
    <span id="stats"></span>
    <div id="legend"></div>
    <button id="disconnect-btn">Trennen</button>
  </div>
  <div id="graph-scroll">
    <canvas id="graph-canvas"></canvas>
  </div>
  <div id="tooltip" class="hidden"></div>
</div>

<script src="app.js"></script>
</body>
</html>
