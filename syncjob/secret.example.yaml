# Vorlage für die Neo4j-Zugangsdaten. Nach k8s/secret.yaml kopieren (wird
# via .gitignore nicht versioniert), NEO4J_PASSWORD durch das echte Passwort
# ersetzen und anwenden: kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: istio-graph-sync-neo4j
  namespace: istio-graph-sync
stringData:
  NEO4J_URI: bolt://neo4j.gmk.lan:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: changeme123
  NEO4J_DATABASE: neo4j
