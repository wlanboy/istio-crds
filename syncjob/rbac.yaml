apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-graph-sync
  namespace: istio-graph-sync
---
# Leserechte, wie in der README (main.py) beschrieben: CRD-Auflistung sowie
# alle Kubernetes-/Istio-Objekte, aus denen istio-graph.py den
# Abhängigkeitsgraphen baut (kubectl.py + istio.py).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: istio-graph-sync
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "serviceaccounts", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - gateways
      - serviceentries
      - sidecars
      - workloadentries
      - workloadgroups
    verbs: ["get", "list"]
  - apiGroups: ["security.istio.io"]
    resources:
      - peerauthentications
      - authorizationpolicies
      - requestauthentications
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: istio-graph-sync
subjects:
  - kind: ServiceAccount
    name: istio-graph-sync
    namespace: istio-graph-sync
roleRef:
  kind: ClusterRole
  name: istio-graph-sync
  apiGroup: rbac.authorization.k8s.io
